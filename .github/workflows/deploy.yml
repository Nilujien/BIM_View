name: Déployer sur GitHub Pages

on:
  push:
    branches:
      - main

  # Permet de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# N'autorise qu'un seul déploiement simultané
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publier les fichiers statiques
        uses: actions/upload-pages-artifact@v3
        with:
          # Déploie tous les fichiers du dépôt
          path: '.'

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
